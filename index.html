<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AetherScribe - AI Worldbuilding Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            typography: ({ theme }) => ({
              DEFAULT: {
                css: {
                  '--tw-prose-body': theme('colors.slate[600]'),
                  '--tw-prose-headings': theme('colors.slate[800]'),
                  '--tw-prose-bold': theme('colors.slate[800]'),
                  '--tw-prose-invert-body': theme('colors.slate[300]'),
                  '--tw-prose-invert-headings': theme('colors.slate[200]'),
                  '--tw-prose-invert-bold': theme('colors.slate[200]'),
                },
              },
            }),
          }
        }
      }
    </script>
    <script>
      // Prevent FOUC for theme
      if (localStorage.getItem('aetherscribe_theme') === 'dark' || (!('aetherscribe_theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    </script>
  <script type="importmap">
{
  "imports": {
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client?dev",
    "react-dom": "https://esm.sh/react-dom@18.2.0?dev",
    "@google/genai": "https://esm.sh/@google/genai@^1.14.0",
    "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime?dev",
    "react": "https://esm.sh/react@18.2.0?dev",
    "jspdf": "https://esm.sh/jspdf@^2.5.1",
    "vis-network/standalone/esm/vis-network.min.js": "https://esm.sh/vis-network@10.0.1/standalone/esm/vis-network.min.js",
    "@tiptap/core": "https://esm.sh/@tiptap/core@2.4.0",
    "@tiptap/react": "https://esm.sh/@tiptap/react@2.4.0?deps=react@18.2.0&dev",
    "@tiptap/starter-kit": "https://esm.sh/@tiptap/starter-kit@2.4.0",
    "prosemirror-state": "https://esm.sh/prosemirror-state@1.4.3",
    "prosemirror-view": "https://esm.sh/prosemirror-view@1.33.6",
    "prosemirror-model": "https://esm.sh/prosemirror-model@1.21.0",
    "prosemirror-transform": "https://esm.sh/prosemirror-transform@1.9.0",
    "dompurify": "https://esm.sh/dompurify@3.1.5",
    "react-dom/": "https://esm.sh/react-dom@18.2.0/",
    "react/": "https://esm.sh/react@18.2.0/",
    "vis-network/": "https://esm.sh/vis-network@^10.0.1/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

    <div id="root"></div>

  </body>
</html>
